---
- hosts: local
  become: yes
  tasks:

    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart SSH

    - name: Set password policy
      lineinfile:
        path: /etc/pam.d/common-password
        regexp: '^password\s+requisite\s+pam_pwquality.so'
        line: 'password requisite pam_pwquality.so retry=3 minlen=12 ucredit=-1 lcredit=-1 dcredit=-1 ocredit=-1'

    - name: Install ufw
      apt:
        name: ufw
        state: present
        update_cache: yes

    - name: Allow SSH
      ufw:
        rule: allow
        port: 22

    - name: Allow HTTP
      ufw:
        rule: allow
        port: 80

    - name: Enable ufw
      ufw:
        state: enabled

    - name: Install fail2ban
      apt:
        name: fail2ban
        state: present

    - name: Ensure fail2ban is running
      service:
        name: fail2ban
        state: started
        enabled: yes

    - name: Remove unnecessary packages
      apt:
        name:
          - telnet
          - rsh-client
        state: absent

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted
